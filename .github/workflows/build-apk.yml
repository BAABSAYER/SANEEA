name: Build Saneea Mobile APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Get dependencies
      run: |
        cd saneea_mobile_flutter
        flutter pub get
        
    - name: Build APK
      run: |
        cd saneea_mobile_flutter
        flutter build apk --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: saneea-mobile-apk
        path: saneea_mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Saneea Mobile v1.0.${{ github.run_number }}
        body: |
          Saneea Mobile App Release
          
          ## Features
          - User authentication and registration
          - Event booking with custom questionnaires
          - Real-time messaging with admin dashboard
          - Multi-language support (English/Arabic)
          - Production server integration
          
          ## Installation
          1. Download the APK file below
          2. Enable "Install from Unknown Sources" on your Android device
          3. Install the APK
          
          Server: http://178.62.41.245:5000
        files: saneea_mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}