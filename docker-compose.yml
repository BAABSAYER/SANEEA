services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        format: raw
    volumes:
      - saneea-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  saneea-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.production
        format: raw
    environment:
      NODE_ENV: production
    command: ["npm", "run", "db:push"]

  saneea-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      saneea-migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env.production
        format: raw
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "18087:5000"

volumes:
  saneea-postgres-data:
